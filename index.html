<!DOCTYPE html>
<html>
<head>
  <title>Beardall Family</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f9fc;
      color: #1f2937;
    }

    header {
      background: linear-gradient(135deg, #4a6fa5, #6b9ac4);
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    header p {
      opacity: 0.9;
    }

    .container {
      max-width: 900px;
      margin: -40px auto 40px;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      margin-top: 0;
    }

    a {
      text-decoration: none;
      color: #4a6fa5;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>Beardall Family</h1>
  <p>Our shared space for photos, plans, and updates</p>
</header>

<div class="container">
  <div class="grid">

    <div class="card">
      <h2>📸 Photos</h2>
      <p><a href="photos.html">View gallery</a></p>
    </div>

    <div class="card">
      <h2>🗓️ Calendar</h2>
      <p><a href="calendar.html">See events</a></p>
    </div>

    <div class="card">
      <h2>📄 Documents</h2>
      <p><a href="https://drive.google.com/...">Family Documents</a></p>
    </div>

    <div class="card">
      <h2>💬 Updates</h2>
      <p>Latest family news</p>
    </div>

  </div>
</div>

</body>
</html>
