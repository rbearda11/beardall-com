<!DOCTYPE html>
<html>
<head>
  <title>Beardall Family</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
      text-align: center;
    }
    header {
      background: #4a6fa5;
      color: white;
      padding: 40px 20px;
    }
    section {
      padding: 30px 20px;
    }
    .card {
      background: white;
      margin: 15px auto;
      padding: 20px;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    a {
      color: #4a6fa5;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>Welcome to the Beardall Family Page</h1>
  <p>Our little corner of the internet ❤️</p>
</header>

<section>
  <div class="card">
    <h2>📸 Photos</h2>
    <p><a href="#">View our photo albums</a></p>
  </div>

  <div class="card">
    <h2>🗓️ Family Calendar</h2>
    <p><a href="#">See upcoming events</a></p>
  </div>

  <div class="card">
    <h2>🔗 Useful Links</h2>
    <p><a href="#">Shared documents</a></p>
  </div>

  <div class="card">
    <h2>💬 Updates</h2>
    <p>Latest news and notes from the family</p>
  </div>
</section>

</body>
</html>
