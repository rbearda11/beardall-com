<!DOCTYPE html>
<html>
<head>
  <title>Family Photos</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>Family Photos</h1>

<div class="gallery">
  <img src="https://via.placeholder.com/300">
  <img src="https://via.placeholder.com/300">
  <img src="https://via.placeholder.com/300">
</div>

</body>
</html>
